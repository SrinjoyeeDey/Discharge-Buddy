kind = "mobile"
previewPath = "/"
title = "DischargeBuddy"
version = "1.0.0"
id = "artifacts/discharge-buddy"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21884

[services.development]
run = "pnpm --filter @workspace/discharge-buddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discharge-buddy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/discharge-buddy", "run", "serve" ]

[services.env]
PORT = "21884"
BASE_PATH = "/"
